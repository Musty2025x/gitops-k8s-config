apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: musty101/gitops-app:a33004b2
          ports:
            - containerPort: 3000
