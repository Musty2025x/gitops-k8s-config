apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-app
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-app
  template:
    metadata:
      labels:
        app: gitops-app
    spec:
      containers:
        - name: gitops-app
          image: musty101/gitops-app:b9f079ea
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: gitops-app
  namespace: dev
  labels:
    app: gitops-app
spec:
  selector:
    app: gitops-app
  ports:
    - name: service
      protocol: TCP
      port: 3000
      targetPort: 3000